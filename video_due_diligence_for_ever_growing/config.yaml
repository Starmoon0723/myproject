# 全局配置文件
api:
  secret: "your-api-secret-here"
  request_timeout: 300  # 请求超时时间（秒）
  allow_external_callback: false
  # 单段最大媒体大小（字节）
  max_audio_bytes: 20971520   # 20MB
  max_video_bytes: 167772160  # 160MB

# 视频预处理（当 submit.video_b64 传“本地路径”而不是 base64 时启用）
video_preprocess:
  # 是否允许把 submit.video_b64 当作本地视频路径来处理
  use_video_path: true
  # 处理顺序：先降 fps 再 resize
  order: ["set_fps", "resize"]
  # 输出临时文件目录（为空则使用系统临时目录）
  tmp_dir: "data/_tmp_video_preprocess"
  # 目标帧率（<=0 表示不处理 fps）
  fps: 2
  # 目标分辨率（<=0 表示不 resize）
  width: 1280
  height: 720

cache:
  default_ttl: 3600     # 默认缓存过期时间（秒）
  cleanup_interval: 60  # 清理间隔（秒）

server:
  host: "127.0.0.1"
  port: 8000
  reload: true

vllm:
  asr:
    base_url: "https://litellm-manage-dev.sandbox.deepbank.daikuan.qihoo.net/v1"
    api_key: "Bearer sk-8ef8cc0e93ec5a04bb1892ce1bf97148"
    model_name: "deepbank/qwen3-asr-1.7b"
    max_concurrent: 10

  video:
    base_url: "https://litellm-manage-dev.sandbox.deepbank.daikuan.qihoo.net/v1"
    api_key: "Bearer sk-8ef8cc0e93ec5a04bb1892ce1bf97148"
    model_name: "deepbank/qwen3-vl-32b"
    max_concurrent: 2

    system_prompt: "你是一个工业视频分析专家，负责区分“工业生产环境”与“非工业生产环境”，识别视觉信息并提取关键的生产要素。"
    prompt: |
      # 目标 #
      1. 识别与过滤：判定当前视频是否为真实的工业生产场景，若为工业场景，仅针对“待处理任务列表”中的任务项，比对“任务项定义全集”进行识别，禁止虚构事实。若为非工业场景，则对各任务项返回“未命中”。
      2. 任务项状态判定：
         - 状态 A (命中且可用）：画面清晰、要素完整
         - 状态 B (未命中)：视频中场景并非工业生产场景，或完全没有出现该任务项的视觉信息。
      3. 证据提取：
         - 状态A：
          a. 画面描述：优先返回码值；若无码值，则提供20字以内的纯视觉描述。
          b. 清晰度：判定画面是否清晰，枚举值:[清晰, 模糊]
          c. 完整性：判断该项关键要素是否拍摄完整，枚举值:[完整, 不完整]
         - 状态B：各项均返回“未命中”。


      # 任务项定义全集 #
      以下是所有可能的分析项及其判定标准，请作为识别依据：
      - 企业大门门头: 拍摄完整企业门头，确保企业名称清晰可识别。门头清晰则返回“门头照清晰，信息完整”，反之返回“门头信息不完整或模糊”。
      - 生产车间: 车间内有专用生产设备、物料，空间上包含生产标语横幅、安全规范告示墙等。
      - 品类: 用于工业生产的原材料实物，结合包装标签作为辅助信息（无标签情况下禁止虚构），给出原材料类别。
      - 存量规模: 可计数的原材料堆垛，结合包装上的数量标签可估算存量的情况。给出估算存量。
      - 生产机器设备: 确保能明确识别的、用于工业生产的设备类型。
      - 运行状态: 根据视频中的生产设备运转情况、监控屏信息，确定设备当前状态，从以下码值中选取运行状态匹配项：[生产运行、停机、检修、调试]。
      - 产能: 视频中有拍摄到机器信息监控屏幕、生产信息监控大屏，可识别具体明确的开工情况、生产计划、当前产能信息。
      - 生产质量: 监控大屏或纸质检验报告，需体现质检情况、良品率、残次数量。
      - 现场作业人员: 视频中出现3名以上身穿工装、正在进行工业生产中的工人时，命中此项。仅当命中时，从以下码值中选取工人状态匹配项：[忙碌、一般、闲散]。
      - 出勤班表: 能清晰体现当前在岗人员信息、班表信息的大屏或纸质文件。

      # 待处理任务列表 #
      {task_list}

      # 输出格式 #
      以JSON格式返回，禁止包含多余的推理过程和结论性判断。
      {{"answer": {{"任务项1": {{"清晰度": "清晰/模糊/未命中", "完整性": "完整/不完整/未命中", "详情": "码值或视觉描述/未命中"}}}}}}

      # 示例输出 #
      {{"answer": {{"运行状态": {{"清晰度": "清晰", "完整性": "完整", "详情": "生产运行"}}, "品类": {{"清晰度": "清晰", "完整性": "不完整", "详情": "堆叠物料为蓝色塑料颗粒，无包装标签"}}, "出勤班表": {{"清晰度": "未命中", "完整性": "未命中", "详情": "未命中"}}}}}}

